<!DOCTYPE html>
<html>
<body>
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@3.5.0/dist/browser/oidc-client-ts.min.js"></script>
    <script>
        new oidc.UserManager({
            authority: "http://localhost:8080/realms/myrealm",
            client_id: "myclient",
        }).signinRedirectCallback().then(() => {
            window.location.href = "index.html";
        }).catch(err => {
            console.error(err);
        });
    </script>
</body>
</html>
