<!DOCTYPE html>
<html>
<head>
    <title>Keycloak Client</title>
</head>
<body>
    <h1>Keycloak OIDC Client</h1>
    <button id="login">Login</button>
    <button id="fetch-data">Fetch Protected Data</button>
    <button id="logout">Logout</button>
    <pre id="output"></pre>

    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@3.5.0/dist/browser/oidc-client-ts.min.js"></script>
    <script>
        const config = {
            authority: "http://localhost:8080/realms/myrealm",
            client_id: "myclient",
            redirect_uri: "http://localhost:3000/callback.html",
            post_logout_redirect_uri: "http://localhost:3000/index.html",
            response_type: "code",
            scope: "openid profile"
        };

        const userManager = new oidc.UserManager(config);

        document.getElementById("login").onclick = () => userManager.signinRedirect();
        
        document.getElementById("logout").onclick = () => userManager.signoutRedirect();

        document.getElementById("fetch-data").onclick = async () => {
            const output = document.getElementById("output");
            try {
                const user = await userManager.getUser();
                if (!user) {
                    output.innerText = "Please login first.";
                    return;
                }

                const response = await fetch("/api/protected-resource", {
                    headers: { "Authorization": `Bearer ${user.access_token}` }
                });

                if (response.status === 401) {
                    output.innerText = "Token expired or invalid.";
                } else {
                    const data = await response.json();
                    output.innerText = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                output.innerText = "Error: " + err.message;
            }
        };
    </script>
</body>
</html>
